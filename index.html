<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki Names Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      content: [],
    }
  </script>

  <style>
    @import "tailwindcss";
    @custom-variant dark (&:where(.dark, .dark *));

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .output {
      font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.65;
    }

    .output::placeholder {
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
  </style>
</head>
<body class="bg-zinc-50 dark:bg-slate-950 min-h-screen transition-colors">

  <div class="max-w-4xl mx-auto py-10 px-4 sm:px-6">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-slate-900 dark:text-white flex items-center justify-center gap-3 mb-3">
        <i class="fas fa-download text-indigo-600"></i>
        Wiki Names Downloader
      </h1>
      <p class="text-slate-600 dark:text-slate-400 text-lg">
        Trích xuất danh sách tên từ Wikidth
      </p>
    </div>

    <!-- Main Card -->
    <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 p-8">
      
      <!-- Input -->
      <div class="mb-8">
        <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">
          Nhập link trang Wiki
        </label>
        <div class="flex gap-3">
          <div class="relative flex-1">
            <input 
              id="urlInput" 
              type="text"
              class="w-full px-6 py-4 text-base border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 rounded-2xl focus:outline-none focus:border-indigo-500 dark:focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 dark:focus:ring-indigo-500/30 transition-all pr-12"
              placeholder="https://wikicv.net/..."
            >
            <button 
              id="clearBtn"
              onclick="clearAll()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors hidden">
              <i class="fas fa-times text-2xl"></i>
            </button>
          </div>

          <button 
            onclick="handleLoad()"
            class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-2xl flex items-center justify-center gap-2 shadow-md min-w-[150px]">
            <i class="fas fa-cloud-arrow-down"></i>
            Get Names
          </button>
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="hidden mb-5 text-sm text-indigo-600 dark:text-indigo-400 flex items-center gap-2">
        <i class="fas fa-spinner fa-spin"></i>
        <span id="statusText">Đang xử lý...</span>
      </div>

      <!-- Result -->
      <div>
        <h3 id="resultTitle" class="text-lg font-semibold text-slate-800 dark:text-slate-200 mb-4">
          Kết quả trích xuất
        </h3>

        <div class="flex gap-3 mb-4">
          <button 
            id="copyBtn"
            onclick="copyToClipboard()"
            class="hidden flex-1 sm:flex-none px-6 py-3 text-sm bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-2xl flex items-center justify-center gap-2 font-medium">
            <i class="fas fa-copy"></i>
            Copy
          </button>
          <button 
            id="downloadBtn"
            onclick="downloadTxt()"
            class="hidden flex-1 sm:flex-none px-6 py-3 text-sm bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl flex items-center justify-center gap-2 font-medium">
            <i class="fas fa-download"></i>
            Download
          </button>
        </div>
        
        <textarea 
          id="output" 
          class="output w-full h-96 p-6 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-3xl text-slate-800 dark:text-slate-100 text-[15px] resize-y focus:outline-none focus:border-indigo-300 dark:focus:border-indigo-500 transition-all"
          readonly
          placeholder="Kết quả sẽ hiển thị tại đây..."></textarea>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-12 text-slate-500 dark:text-slate-400 text-sm">
      Developed by <span class="font-semibold text-slate-700 dark:text-slate-300">Giaychuidis</span>
    </div>
  </div>

  <!-- Floating Dark Mode Button -->
  <button 
    id="darkToggle"
    onclick="toggleDarkMode()"
    class="fixed bottom-6 right-6 w-12 h-12 bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-2xl shadow-lg flex items-center justify-center text-slate-600 dark:text-slate-300 transition-all active:scale-95 z-50">
    <i id="themeIcon" class="fas fa-moon text-2xl"></i>
  </button>

  <script>
    let currentStoryName = "";

    function cleanFileName(str) {
      if (!str) return "Truyen";
      return str
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d").replace(/Đ/g, "D")
        .replace(/[^a-zA-Z0-9\s_-]/g, "")
        .replace(/\s+/g, "_")
        .replace(/_+/g, "_")
        .trim();
    }

    function extractStoryNameFromUrl(url) {
      try {
        const urlObj = new URL(url);
        const pathParts = urlObj.pathname.split('/').filter(Boolean);
        for (let part of pathParts) {
          if (part.includes('-') && part.length > 10) {
            const slug = part.replace(/-[A-Za-z0-9]{10,}$/, '');
            if (slug) return slug.replace(/-/g, ' ');
          }
        }
      } catch (e) {}
      return null;
    }

    async function handleLoad() {
      const urlInput = document.getElementById("urlInput");
      const output = document.getElementById("output");
      const status = document.getElementById("status");
      const statusText = document.getElementById("statusText");
      const copyBtn = document.getElementById("copyBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const resultTitle = document.getElementById("resultTitle");

      const url = urlInput.value.trim();
      if (!url) {
        alert("Vui lòng nhập link Wiki!");
        return;
      }

      output.value = "";
      copyBtn.classList.add("hidden");
      downloadBtn.classList.add("hidden");
      status.classList.remove("hidden");
      statusText.textContent = "Đang tải trang Wiki...";
      resultTitle.textContent = "Kết quả trích xuất";

      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error("Không thể truy cập trang");

        const html = await res.text();

        let storyName = extractStoryNameFromUrl(url) ||
                        (html.match(/<title>(.*?)<\/title>/i)?.[1]?.trim().replace(/ - .*$/, '') || "Unknown");

        currentStoryName = cleanFileName(storyName);

        const match = html.match(/bookId\s*=\s*"([a-f0-9]+)"/i);
        if (!match) throw new Error("Không tìm thấy bookId");

        const bookId = match[1];
        statusText.textContent = `Đang lấy danh sách tên...`;

        const apiRes = await fetch(`https://wikicv.net/name-list?bookId=${bookId}&id=COMMON`);
        const data = await apiRes.json();

        const content = data?.data?.content;
        if (!content) throw new Error("Không có dữ liệu");

        const names = [...content.matchAll(/data-ncn="(.*?)".*?data-nvi="(.*?)"/g)]
          .map(m => `${m[1]}=${m[2]}`);

        output.value = names.length ? names.join("\n") : "Không tìm thấy tên nào.";

        if (names.length) {
          resultTitle.textContent = `Kết quả trích xuất (${names.length} names)`;
          copyBtn.classList.remove("hidden");
          downloadBtn.classList.remove("hidden");
        }
      } catch (err) {
        output.value = `❌ Lỗi: ${err.message}`;
      } finally {
        status.classList.add("hidden");
      }
    }

    function clearAll() {
      document.getElementById("urlInput").value = "";
      document.getElementById("output").value = "";
      document.getElementById("copyBtn").classList.add("hidden");
      document.getElementById("downloadBtn").classList.add("hidden");
      document.getElementById("resultTitle").textContent = "Kết quả trích xuất";
      document.getElementById("clearBtn").classList.add("hidden");
    }

    function downloadTxt() {
      const output = document.getElementById("output");
      if (!output.value) return;
      const blob = new Blob([output.value], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `Name2_${currentStoryName || "Truyen"}.txt`;
      link.click();
    }

    async function copyToClipboard() {
      const output = document.getElementById("output");
      const copyBtn = document.getElementById("copyBtn");
      if (!output.value) return;

      await navigator.clipboard.writeText(output.value);
      const original = copyBtn.innerHTML;
      copyBtn.innerHTML = `<i class="fas fa-check"></i> Đã copy`;
      copyBtn.classList.add("!bg-emerald-100", "!text-emerald-700", "dark:!bg-emerald-900", "dark:!text-emerald-300");

      setTimeout(() => {
        copyBtn.innerHTML = original;
        copyBtn.classList.remove("!bg-emerald-100", "!text-emerald-700", "dark:!bg-emerald-900", "dark:!text-emerald-300");
      }, 2000);
    }

    function toggleDarkMode() {
      const html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const icon = document.getElementById('themeIcon');
      icon.className = document.documentElement.classList.contains('dark') 
        ? 'fas fa-sun text-2xl' 
        : 'fas fa-moon text-2xl';
    }

    window.addEventListener('load', () => {
      const html = document.documentElement;
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      if (saved === 'dark' || (!saved && prefersDark)) {
        html.classList.add('dark');
      }
      updateThemeIcon();

      const urlInput = document.getElementById("urlInput");
      const clearBtn = document.getElementById("clearBtn");
      urlInput.addEventListener("input", () => {
        clearBtn.classList.toggle("hidden", !urlInput.value.trim());
      });
    });

    document.getElementById("urlInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") handleLoad();
    });
  </script>
</body>
</html>
