<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix Text</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f5f3;
            --white: #ffffff;
            --border: #e5e5e3;
            --border-dark: #d0d0ce;
            --text: #1a1a1a;
            --text-2: #666;
            --text-3: #999;
            --accent: #1a1a1a;
            --tag-spam-bg: #fff0f0; --tag-spam: #d93025;
            --tag-del-bg: #fff7e6;  --tag-del: #b45309;
            --tag-fix-bg: #f0fdf4;  --tag-fix: #16a34a;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', sans-serif;
        }

        html, body { height: 100%; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── HEADER ── */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            height: 48px;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .header-sep { width: 1px; height: 16px; background: var(--border); }

        .status-pill {
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            background: var(--bg);
            color: var(--text-3);
            border: 1px solid var(--border);
            transition: all 0.2s;
        }
        .status-pill.ok  { background: #f0fdf4; color: #16a34a; border-color: #bbf7d0; }
        .status-pill.err { background: #fff0f0; color: #d93025; border-color: #fecaca; }

        .header-actions { margin-left: auto; display: flex; gap: 6px; }

        .btn {
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-dark);
            background: var(--white);
            color: var(--text-2);
            cursor: pointer;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn:hover { background: var(--bg); color: var(--text); border-color: #bbb; }
        .btn-copy {
            background: var(--text);
            color: var(--white);
            border-color: var(--text);
        }
        .btn-copy:hover { background: #333; color: var(--white); border-color: #333; }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            overflow: hidden;
        }

        .pane {
            display: flex;
            flex-direction: column;
            background: var(--white);
            overflow: hidden;
        }

        .pane + .pane {
            border-left: 1px solid var(--border);
        }

        .pane-header {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .pane-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-3);
        }

        .pane-hint {
            font-size: 11px;
            color: var(--text-3);
            margin-left: auto;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.75;
            padding: 16px;
            color: var(--text);
            background: transparent;
            caret-color: #1a1a1a;
        }

        textarea::placeholder { color: var(--text-3); font-family: var(--sans); font-size: 13px; }
        #output { color: #1a5c2e; background: #fafffe; }

        /* ── LOG ── */
        .log-section {
            background: var(--white);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: none;
            flex-direction: column;
            max-height: 180px;
        }
        .log-section.visible { display: flex; }

        .log-header {
            padding: 7px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-3);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .log-stat { display: flex; align-items: center; gap: 4px; }
        .log-stat-dot { width: 6px; height: 6px; border-radius: 50%; }

        .log-body {
            overflow-y: auto;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .log-body::-webkit-scrollbar { width: 4px; }
        .log-body::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 2px; }

        .log-row {
            display: grid;
            grid-template-columns: 42px 64px 1fr 16px 80px;
            align-items: center;
            gap: 8px;
            font-size: 11.5px;
            font-family: var(--mono);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .log-row:hover { background: var(--bg); }

        .tag {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.08em;
            padding: 1px 5px;
            border-radius: 3px;
            text-align: center;
        }
        .tag-spam { background: var(--tag-spam-bg); color: var(--tag-spam); }
        .tag-del  { background: var(--tag-del-bg);  color: var(--tag-del); }
        .tag-fix  { background: var(--tag-fix-bg);  color: var(--tag-fix); }

        .log-loc  { color: var(--text-3); font-size: 10.5px; }
        .log-from { color: var(--tag-spam); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-arr  { color: var(--text-3); text-align: center; }
        .log-to   { color: var(--tag-fix); }
        .log-ctx  { grid-column: 1/-1; font-size: 10.5px; color: var(--text-3); padding-left: 50px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── WM BAR ── */
        .wm-bar {
            background: var(--white);
            border-top: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .wm-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-3);
            letter-spacing: 0.04em;
            white-space: nowrap;
        }

        .wm-input {
            font-family: var(--sans);
            font-size: 12px;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 4px 10px;
            outline: none;
            color: var(--text);
            background: var(--bg);
            flex: 1;
            min-width: 140px;
            transition: border-color 0.15s;
        }
        .wm-input:focus { border-color: #aaa; background: var(--white); }

        .wm-count {
            font-family: var(--sans);
            font-size: 12px;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 4px 8px;
            outline: none;
            color: var(--text);
            background: var(--bg);
            width: 54px;
            transition: border-color 0.15s;
        }
        .wm-count:focus { border-color: #aaa; background: var(--white); }

        .wm-note { font-size: 11px; color: var(--text-3); margin-left: auto; }
    </style>
</head>
<body>

<div class="header">
    <span class="title">Fix Text</span>
    <div class="header-sep"></div>
    <span class="status-pill" id="status">sẵn sàng</span>
    <div class="header-actions">
        <button class="btn" onclick="clearAll()">✕ Xóa</button>
        <button class="btn btn-copy" onclick="copyResult()">⎘ Copy kết quả</button>
    </div>
</div>

<div class="main">
    <div class="pane">
        <div class="pane-header">
            <span class="pane-label">Input</span>
            <span class="pane-hint">Paste vào để tự động xử lý</span>
        </div>
        <textarea id="input" placeholder="Dán văn bản vào đây..."></textarea>
    </div>

    <div class="pane">
        <div class="pane-header">
            <span class="pane-label">Output</span>
        </div>
        <textarea id="output" readonly placeholder="Kết quả hiển thị ở đây..."></textarea>
    </div>
</div>

<div class="log-section" id="log-section">
    <div class="log-header" id="log-header"></div>
    <div class="log-body" id="log-body"></div>
</div>

<div class="wm-bar">
    <span class="wm-label">Watermark</span>
    <input class="wm-input" type="text" id="watermark-text" placeholder="Nội dung watermark..." value="Nguồn: Tài liệu nội bộ">
    <input class="wm-count" type="number" id="watermark-count" min="1" max="50" value="2">
    <span class="wm-note" id="wm-note">tự động chèn sau khi xử lý</span>
</div>

<script>
    const charMap = {
        '⼉':'儿','⻝':'食','⼦':'子','⻔':'门','⽤':'用','⽅':'方','⼜':'又','⼀':'一',
        '⼗':'十','⼤':'大','⼈':'人','⼊':'入','⼋':'八','⼒':'力','⼑':'刀','⼥':'女',
        '⼩':'小','⼯':'工','⼰':'己','⼱':'巾','⼲':'干','⼴':'广','⼸':'弓','⼼':'心',
        '⼿':'手','⽀':'支','⽂':'文','⽇':'日','⽉':'月','⽊':'木','⽔':'水','⽕':'火',
        '⽗':'父','⽚':'片','⽛':'牙','⽜':'牛','⽝':'犬','⽟':'玉','⽡':'瓦','⽢':'甘',
        '⽣':'生','⽥':'田','⽩':'白','⽪':'皮','⽫':'皿','⽬':'目','⽯':'石','⽰':'示',
        '⽲':'禾','⽳':'穴','⽴':'立','⽵':'竹','⽶':'米','⽷':'糸','⽹':'网','⽺':'羊',
        '⽻':'羽','⽼':'老','⽾':'而','⽿':'耳','⾁':'肉','⾂':'臣','⾃':'自','⾄':'至',
        '⾆':'舌','⾈':'舟','⾊':'色','⾍':'虫','⾎':'血','⾏':'行','⾐':'衣','⾓':'角',
        '⾔':'言','⾕':'谷','⾖':'豆','⾙':'贝','⾚':'赤','⾛':'走','⾜':'足','⾝':'身',
        '⾞':'车','⾟':'辛','⾨':'门','⾦':'金','⾧':'长','⾬':'雨','⾮':'非','⾯':'面',
        '⾷':'食','⾸':'首','⾹':'香','⾻':'骨','⾼':'高','⾥':'里','⽆':'无','⻢':'马',
        '⻅':'见','⻆':'角','⻩':'黄'
    };

    // ── WATERMARK ──
    const zwChars = ['\u200D','\u200C','\u200B','\u200E','\u200F'];
    const variations = ['\uFE00','\uFE01','\uFE02','\uFE0E','\uFE0F'];
    const invisSeps = ['\u2060','\u2063','\uFEFF','\u180E'];
    const spaceVars = ['\u0020','\u00A0','\u2002','\u2003','\u2009','\u200A'];

    function loadWm() {
        const s = localStorage.getItem('wmText');
        if (s) document.getElementById('watermark-text').value = s;
    }

    function encodeWatermark(text) {
        let e = text.split('').map((c,i) =>
            i > 0 && Math.random() > 0.3 ? zwChars[Math.floor(Math.random()*zwChars.length)] + c : c
        ).join('');
        e = e.split('').map((c,i,a) =>
            i > 0 && i < a.length-1 && Math.random() > 0.5 ? c + invisSeps[Math.floor(Math.random()*invisSeps.length)] : c
        ).join('');
        e = e.split(' ').map((w,i) => i > 0 ? spaceVars[Math.floor(Math.random()*spaceVars.length)] + w : w).join('');
        e = e.split('').map(c => Math.random() > 0.6 ? c + variations[Math.floor(Math.random()*variations.length)] : c).join('');
        return e;
    }

    function insertWatermark(text) {
        const wt = document.getElementById('watermark-text').value.trim();
        const wc = parseInt(document.getElementById('watermark-count').value) || 2;
        if (!wt || !text.trim()) return text;
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) return text;
        const maxWm = lines.length - 1;
        const actual = Math.min(wc, maxWm);
        const pool = Array.from({length: maxWm}, (_,i) => i+1);
        const sel = [];
        for (let i = 0; i < actual; i++) {
            const ri = Math.floor(Math.random()*pool.length);
            sel.push(pool[ri]); pool.splice(ri,1);
        }
        sel.sort((a,b) => a-b);
        let result = [], wi = 0;
        for (let i = 0; i < lines.length; i++) {
            result.push(lines[i]);
            if (wi < sel.length && sel[wi] === i+1) { result.push(encodeWatermark(wt)); wi++; }
        }
        setWmNote(`Đã chèn ${actual} watermark`);
        return result.join('\n');
    }

    // ── SPAM ──
    function isSpamBotLine(line) {
        const s = line.replace(/[?\[\]·●丶\s]/g,'').replace(/[\u200B-\u200F\u2060\u2063\uFEFF\u180E]/g,'');
        const kws = [/文件防盗印/,/找书机器人/,/稳定靠谱/,/不踩[坑雷]/,/小虎bot/i,/虎bot/i,/xiaohu/i,/xiAOHU/i,/找丶书/,/防丶盗/,/稳丶定/];
        let n = 0;
        for (const k of kws) { if (k.test(s)) { n++; if (n >= 2) return true; } }
        const qr = (line.match(/\?/g)||[]).length / line.length;
        return qr > 0.3 && /[\u4e00-\u9fff]/.test(line);
    }

    function isSpamTailLine(line) {
        const t = line.trim();
        return t.length > 0 && /^[\?\？\[\]\s]+$/.test(t);
    }

    function removeSpam(text) {
        const lines = text.split('\n'), result = [], removed = [];
        let prevSpam = false;
        for (let i = 0; i < lines.length; i++) {
            if (isSpamBotLine(lines[i])) {
                removed.push({ ln: i+1, content: lines[i], type:'spam' });
                prevSpam = true;
            } else if (prevSpam && isSpamTailLine(lines[i])) {
                removed.push({ ln: i+1, content: lines[i], type:'tail' });
            } else {
                result.push(lines[i]);
                prevSpam = false;
            }
        }
        return { text: result.join('\n'), removed };
    }

    // ── CORE ──
    function process(input) {
        if (!input.trim()) return { out: '', changes: [] };

        let text = input;
        const changes = [];

        // Bước 0: spam
        const { text: t0, removed } = removeSpam(text);
        text = t0;
        for (const r of removed) {
            const p = r.content.length > 50 ? r.content.slice(0,50)+'…' : r.content;
            changes.push({ type:'spam', from: p, to:'[xóa]', ln: r.ln, col:1, ctx: r.type==='tail'?'đuôi rác':'spam bot', pos:-1 });
        }

        // Bước 1: xóa ký tự thừa
        const re1 = /[TtŤťṪṫṬṭṮṯṰṱŢţẗŦŧƭƬȚțŤťṬṭṰṱ][UuÚúÙùÛûÜüŨũŪūŬŭŮůŲųỤụỦủṲṳṴṵṶṷṸṹṺṻŰűŮůū́ŭų][\u0300-\u036F]*[\u2070-\u209F₀-₉ₐₑₕᵢⱼₖₗₘₙₒₚᵣₛₜᵤᵥwₓᵧᶻ⁰-⁹¹²³⁴⁵⁶⁷⁸⁹ᵃ-ᶻ⁺⁻⁼⁽⁾₊₋₌₍₎]+/g;
        let m;
        while ((m = re1.exec(text)) !== null) {
            const before = text.slice(0,m.index), ln = before.split('\n').length, ls = before.lastIndexOf('\n')+1;
            changes.push({ type:'del', from: m[0], to:'[xóa]', ln, col: m.index-ls+1, ctx:'', pos: m.index });
            re1.lastIndex = m.index+1;
        }
        text = text.replace(/[TtŤťṪṫṬṭṮṯṰṱŢţẗŦŧƭƬȚțŤťṬṭṰṱ][UuÚúÙùÛûÜüŨũŪūŬŭŮůŲųỤụỦủṲṳṴṵṶṷṸṹṺṻŰűŮůū́ŭų][\u0300-\u036F]*[\u2070-\u209F₀-₉ₐₑₕᵢⱼₖₗₘₙₒₚᵣₛₜᵤᵥwₓᵧᶻ⁰-⁹¹²³⁴⁵⁶⁷⁸⁹ᵃ-ᶻ⁺⁻⁼⁽⁾₊₋₌₍₎]+/g,'');

        // Bước 2: charmap
        for (const [from, to] of Object.entries(charMap)) {
            const re = new RegExp(from,'g'); let mc;
            while ((mc = re.exec(text)) !== null) {
                const before = text.slice(0,mc.index), ln = before.split('\n').length, ls = before.lastIndexOf('\n')+1;
                changes.push({ type:'fix', from, to, ln, col: mc.index-ls+1, ctx:'', pos: mc.index });
                re.lastIndex = mc.index+1;
            }
            text = text.replace(new RegExp(from,'g'), to);
        }

        return { out: text, changes };
    }

    function run() {
        const input = document.getElementById('input').value;
        if (!input.trim()) { clearAll(); return; }

        const { out, changes } = process(input);
        const final = insertWatermark(out);
        document.getElementById('output').value = final;

        renderLog(changes);

        if (changes.length === 0) setStatus('không có thay đổi', '');
        else setStatus(`${changes.length} thay đổi`, 'ok');
    }

    function renderLog(list) {
        const sec = document.getElementById('log-section');
        if (!list.length) { sec.classList.remove('visible'); return; }

        list.sort((a,b) => { const o={spam:0,del:1,fix:2}; return o[a.type]-o[b.type] || a.pos-b.pos; });

        const nS = list.filter(c=>c.type==='spam').length;
        const nD = list.filter(c=>c.type==='del').length;
        const nF = list.filter(c=>c.type==='fix').length;

        document.getElementById('log-header').innerHTML = `
            <span style="font-weight:600;color:#1a1a1a">${list.length} thay đổi</span>
            ${nS ? `<span class="log-stat"><span class="log-stat-dot" style="background:#d93025"></span>${nS} spam</span>` : ''}
            ${nD ? `<span class="log-stat"><span class="log-stat-dot" style="background:#b45309"></span>${nD} xóa</span>` : ''}
            ${nF ? `<span class="log-stat"><span class="log-stat-dot" style="background:#16a34a"></span>${nF} sửa</span>` : ''}
        `;

        document.getElementById('log-body').innerHTML = list.map(c => {
            const tc = c.type==='spam'?'tag-spam': c.type==='del'?'tag-del':'tag-fix';
            const tl = c.type==='spam'?'SPAM': c.type==='del'?'XÓA':'FIX';
            return `<div class="log-row">
                <span class="tag ${tc}">${tl}</span>
                <span class="log-loc">L${c.ln}:${c.col}</span>
                <span class="log-from">${esc(c.from)}</span>
                <span class="log-arr">→</span>
                <span class="log-to">${esc(c.to)}</span>
                ${c.ctx ? `<span class="log-ctx">${esc(c.ctx)}</span>` : ''}
            </div>`;
        }).join('');

        sec.classList.add('visible');
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function setStatus(msg, cls) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = 'status-pill' + (cls ? ' '+cls : '');
    }

    function setWmNote(msg) {
        const el = document.getElementById('wm-note');
        el.textContent = msg;
        setTimeout(() => el.textContent = 'tự động chèn sau khi xử lý', 3000);
    }

    function clearAll() {
        document.getElementById('input').value = '';
        document.getElementById('output').value = '';
        document.getElementById('log-section').classList.remove('visible');
        setStatus('sẵn sàng', '');
    }

    function copyResult() {
        const v = document.getElementById('output').value;
        if (!v.trim()) { setStatus('output trống', 'err'); return; }
        navigator.clipboard.writeText(v)
            .then(() => setStatus('đã copy!', 'ok'))
            .catch(() => { document.getElementById('output').select(); document.execCommand('copy'); setStatus('đã copy!', 'ok'); });
    }

    // Auto-run on input
    let _t;
    document.getElementById('input').addEventListener('input', () => {
        clearTimeout(_t);
        _t = setTimeout(run, 400);
    });

    // Watermark settings persistence
    document.getElementById('watermark-text').addEventListener('input', function() {
        localStorage.setItem('wmText', this.value);
    });

    window.addEventListener('DOMContentLoaded', loadWm);
</script>
</body>
</html>
